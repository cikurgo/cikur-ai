<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIKUR AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#111,#1f1f1f);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:700px;
padding:30px;
}

img{
width:160px;
margin-bottom:20px;
}

h1{
font-size:48px;
margin-bottom:10px;
color:#FFC107;
}

p{
font-size:18px;
line-height:1.7;
opacity:.9;
margin-bottom:30px;
}

button{
background:#FFC107;
color:#111;
border:none;
padding:16px 40px;
font-size:18px;
border-radius:50px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/cikurgo/cikur-ai/main/cgo.png" alt="CGO">

<h1>CIKUR AI</h1>

<p>
Asisten Virtual Resmi CIKUR GO.<br>
Siap membantu pelanggan, mitra, dan operasional perusahaan secara cepat, mudah, dan profesional.
</p>

<button onclick="window.botpress.open();">
Mulai Chat
</button>

</div>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

</html>
