<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    overflow-x:hidden;
    overflow-y:auto;
}
/* ===========================
   LAYOUT UTAMA
=========================== */

.container{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:18px 18px 22px;
    display:flex;
flex-direction:column;
min-height:calc(100dvh - 20px);
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.logo-img{
    width:105px;
    display:block;
    margin:0 auto 10px;
}

h1{
    font-size:32px;
    font-weight:800;
    color:#FFC107;
    margin:0 0 10px;
}

.hero-tag{
    display:inline-block;
    padding:8px 22px;
    margin:0 auto 14px;
    border-radius:999px;
    background:rgba(255,193,7,.15);
    border:1px solid rgba(255,193,7,.35);
    color:#FFC107;
    font-size:14px;
    font-weight:700;
}

.hero-title{
    font-size:24px;
    font-weight:800;
    color:#fff;
    margin:0 0 10px;
}

.hero-desc{
    font-size:15px;
    line-height:1.55;
    color:#ececec;
    margin:0 0 8px;
}

.hero-info{
    font-size:13px;
    line-height:1.5;
    color:#bdbdbd;
    margin:0 0 12px;
}

/* ===== Tombol ===== */

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:40px;
    margin:8px 0 18px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(90deg,#FFC107,#FFD95A);
    color:#111;
    transition:.3s;
    box-shadow:0 10px 25px rgba(255,193,7,.25);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(255,193,7,.35);
}


/* ===== Footer ===== */

footer{
    text-align:center;
    margin-top:auto;
    padding:8px 0 4px;
    color:#bdbdbd;
    font-size:12px;
    line-height:1.4;
}

footer p{
    margin:0;
}
/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes breathe{

0%{
transform:translateY(0px);
}
50%{
transform:translateY(-6px);
}
100%{
transform:translateY(0px);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}
50%{
transform:scale(1.12);
}
100%{
transform:scale(1.05);
}

}

/* ===========================
   RESPONSIVE FINAL CIKUR GO
=========================== */

@media screen and (max-width:430px){

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    overflow-x:hidden;
    overflow-y:auto;
}

.container{
    width:100%;
    max-width:420px;
    padding:16px;
    border-radius:24px;
}

.logo-img{
    width:96px;
}

h1{
    font-size:30px;
}

.hero-tag{
    font-size:13px;
    padding:7px 18px;
}

.hero-title{
    font-size:22px;
}

.hero-desc{
    font-size:14px;
}

.hero-info{
    font-size:12px;
}

.hero-banner{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    margin:12px auto;
    position:relative;

    box-shadow:
        0 12px 30px rgba(0,0,0,.35),
        0 0 18px rgba(255,193,7,.08);

    transition:.35s;
}
.hero-banner:hover{
    transform:translateY(-2px);
    box-shadow:
        0 18px 40px rgba(0,0,0,.45),
        0 0 22px rgba(255,193,7,.12);
}
.menu-title{
    margin:8px 0 12px;
    font-size:17px;
}
/* ===== MENU PREMIUM ===== */

.menu-grid{
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    gap:18px;
    margin:4px 0 18px;
}

.menu-item{
    width:92px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:#fff;
    transition:.3s;
}

.menu-item img{

    width:105px;
    height:105px;
    object-fit:contain;
    padding:0;
    background:transparent;
    border:none;
    border-radius:0;
    box-shadow:none;

    filter:
        drop-shadow(0 0 8px rgba(255,215,120,.55))
        drop-shadow(0 0 20px rgba(255,193,7,.25));

    transition:.35s;
}
.menu-item:hover img{
    transform:translateY(-6px) scale(1.08);
    filter:
        drop-shadow(0 0 10px rgba(255,215,120,.75))
        drop-shadow(0 0 25px rgba(255,193,7,.45));

}

.menu-item:active img{
    transform:scale(.96);
}

.menu-item span{
    margin-top:4px;
    color:#fff;
    font-size:13px;
    font-weight:700;
    letter-spacing:.4px;

}
/* ===========================
   PREMIUM BANNER CIKUR GO
=========================== */

.hero-banner{
    width:100%;
    margin:12px auto 14px;
}

.slider{
    width:100%;
    aspect-ratio:16/7;
    overflow:hidden;
    position:relative;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.16);
    background:#1d1d1d;
    box-shadow:
        0 6px 16px rgba(0,0,0,.22),
        0 1px 0 rgba(255,255,255,.08) inset;
    transition:.3s ease;
}
.slides{
    display:flex;
    transition:transform .7s ease-in-out;
}

.slides img{
    width:100%;
    min-width:100%;
    display:block;
    object-fit:cover;
    border-radius:20px;
}

.dots{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:14px;
}

.dots span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    transition:.35s;
}

.dots span.active{
    width:26px;
    height:8px;
    border-radius:20px;
    background:#FFC107;
    box-shadow:0 0 12px rgba(255,193,7,.5);
}
  
/* ===========================
   HERO BANNER BESAR
=========================== */
.hero-frame{
    position:relative;
    margin-bottom:22px;
}
.hero-big{
    width:100%;
    height:250px;
    overflow:hidden;
    border-radius:28px;
    position:relative;
    margin-bottom:-30px;
    z-index:1;

    box-shadow:
        0 12px 30px rgba(0,0,0,.35),
        0 0 18px rgba(255,193,7,.08);
}

.hero-big-track{
    display:flex;
    transition:transform 1s ease;
}

.hero-big-track img{
    width:100%;
    height:250px;
    min-width:100%;
    object-fit:cover;
    display:block;
}
/* ===========================
   MINI BANNER
=========================== */

.mini-slider{
    position:relative;
    z-index:2;

    width:100%;
    height:100px;

    margin-top:-30px;
    margin-bottom:12px;

    overflow:hidden;
    border-radius:22px;
}
.mini-slides{
    display:flex;
    width:300%;
    height:100%;
    transition:transform .7s ease;
}
.mini-slides img{
    width:33.3333%;
    flex-shrink:0;
    object-fit:cover;
    display:block;
}

.mini-dots{
    display:flex;
    justify-content:center;
    gap:7px;
    margin-top:-6px;
    margin-bottom:18px;
}
.mini-dots span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#666;
}

.mini-dots span.active{
    background:#FFC107;
}
.menu-item img{
animation:robotFloat 3.5s ease-in-out infinite;
}
</style>
</head>
</body>

LAYANAN UTAMA

<h2 class="hero-title">

</h2>

<p class="hero-desc">

    <script>

const slides=document.querySelector(".slides");
const images=document.querySelectorAll(".slides img");
const dots=document.querySelectorAll(".dots span");
const slider=document.querySelector(".slider");
let current=0;
const total=images.length;
function showSlide(index){

    slides.style.transform=`translateX(-${index*100}%)`;

    dots.forEach(dot=>dot.classList.remove("active"));
    dots[index].classList.add("active");

}

function nextSlide(){
    current++;
    if(current>=total){
        current=0;
    }
    showSlide(current);
}
setInterval(nextSlide,4000);

/* ===== Swipe ===== */

let startX=0;
let endX=0;

slider.addEventListener("touchstart",(e)=>{
    startX=e.touches[0].clientX;
});

slider.addEventListener("touchend",(e)=>{

    endX=e.changedTouches[0].clientX;
    if(startX-endX>50){
        current++;
        if(current>=total) current=0;
        showSlide(current);
    }

    if(endX-startX>50){
        current--;
        if(current<0) current=total-1;
        showSlide(current);

    }

});

/* ===== Klik Banner ===== */

slider.addEventListener("click",()=>{
    if(current===0){
        window.location.href="assistant.html";
    }
    else if(current===1){
        window.location.href="food.html";
    }
    else{
        window.location.href="ride.html";
    }

});
        
</script>

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});
 
    </script>
    <script>
        
const miniSlides = document.querySelector(".mini-slides");
const miniDots = document.querySelectorAll(".mini-dots span");
let miniCurrent = 0;
const miniTotal = miniDots.length;
function miniShow(index){
    miniSlides.style.transform = `translateX(-${index * 33.333}%)`;
    miniDots.forEach(dot => dot.classList.remove("active"));
    miniDots[index].classList.add("active");
}
function miniNext(){
    miniCurrent++;
    if(miniCurrent >= miniTotal){
        miniCurrent = 0;
    }
    miniShow(miniCurrent);
}
miniShow(0);   // tampilkan slide pertama saat halaman dibuka
setInterval(miniNext,7000);
</script>

<script>
const heroTrack=document.querySelector(".hero-big-track");
let heroIndex=0;
function heroSlide(){
    heroIndex++;

        heroIndex=0;
    }
    heroTrack.style.transform=`translateX(-${heroIndex*100}%)`;
}
setInterval(heroSlide,9000);
</script>
