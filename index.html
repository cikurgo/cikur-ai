<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGO - Asisten Virtual CIKUR GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body{
    background: radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    margin:0;
    padding:12px;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
        }
        .main-content{
display:flex;
flex-direction:column;
align-items:center;
        }
        .container{
    width:100%;
    max-width:460px;

    background:rgba(255,255,255,.04);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);

    padding:22px 20px;

    border-radius:28px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.45);
        }
        .robot-wrapper { display: flex; justify-content: center; margin-bottom: 10px; }
        .logo-img{
width:145px;
height:auto;
animation:breathe 4s ease-in-out infinite;
        }
@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}
 h1{
font-size:38px;
margin:4px 0 8px;
color:#FFC107;
 }
 p{
font-size:14px;
line-height:1.5;
margin-bottom:16px;
color:#ccc;
 }

        /* Menu Grid Style */
        .menu-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            margin:14px 0 18px;
            gap: 20px;
        }

        .menu-item {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: .3s;
            width: 80px;
        }
.menu-item:hover{
transform:translateY(-6px);
}
.menu-item img{
width:72px;
height:72px;
border-radius:15px;
display:block;
margin:0 auto 10px auto;
border:2px solid #FFC107;
background:white;
padding:8px;
transition:.3s;
}
.menu-item:hover img{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,193,7,.6);
}
        .menu-item span{
    display:block;
    width:100%;
    margin-top:10px;
    text-align:center;
    font-size:12px;
    font-weight:600;
    letter-spacing:.5px;
        }
    .assistant-icon{
    transform: scale(1.12);
    box-shadow: 0 0 18px rgba(255,193,7,.6);
    animation: assistantPulse 2s infinite;
}

@keyframes assistantPulse{
    0%{
        transform: scale(1.12);
        box-shadow: 0 0 10px rgba(255,193,7,.35);
    }
    50%{
        transform: scale(1.18);
        box-shadow: 0 0 22px rgba(255,193,7,.7);
    }
    100%{
        transform: scale(1.12);
        box-shadow: 0 0 10px rgba(255,193,7,.35);
    }
}
        button { 
            background: linear-gradient(45deg, #FFC107, #ffdb58); 
            color: #000; 
            border: none; 
            width : 100%;
            padding: 18px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.2); 
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 193, 7, 0.4); }
        footer { position: fixed; bottom: 15px; font-size: 11px; opacity: 0.4; }
        
        @media (max-width: 600px) { .container { padding: 30px 20px; } h1 { font-size: 36px; } }

/* ========================= */
/* SECTION CARD */
/* ========================= */

.section-card{
    width:90%;
    max-width:700px;
    margin:30px auto;
    padding:35px 25px;
    background:#232323;
    border:2px solid rgba(255,193,7,.25);
    border-radius:30px;
    box-shadow:0 12px 35px rgba(0,0,0,.35);
    color:#fff;
}
.section-card h2{
    color:#FFC107;
    text-align:center;
    font-size:32px;
    margin-bottom:20px;
    text-shadow:0 0 15px rgba(255,193,7,.35);
}
.section-card p{
    color:#d6d6d6;
    line-height:1.8;
    text-align:center;
    font-size:18px;
}
.feature-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
    margin-top:25px;
}
.feature-item{
    background:#2c2c2c;
    border-radius:20px;
    padding:20px;
    border:1px solid rgba(255,193,7,.25);
    transition:.3s;
}
.feature-item:hover{
    transform:translateY(-6px);
    box-shadow:0 12px 25px rgba(255,193,7,.15);
}
.feature-item h3{
    color:#FFC107;
    margin-bottom:10px;
    font-size:20px;
}
.feature-item p{
    text-align:left;
    font-size:16px;
    line-height:1.6;
}
.faq-item{
    background:#2b2b2b;
    border-radius:18px;
    padding:18px;
    margin-top:18px;
    border-left:5px solid #FFC107;
}
.faq-item h3{
    color:#FFC107;
    margin-bottom:10px;
    font-size:19px;
}
.faq-item p{
    text-align:left;
    font-size:16px;
}
@media(max-width:600px){

.section-card{
padding:28px 20px;
}
.section-card h2{
font-size:28px;
}
.feature-grid{
grid-template-columns:1fr;
}

   .menu-utama{
    position: relative;
    border: 2px solid #FFC107;
}
.menu-utama{
    border: 2px solid #FFC107;
    border-radius: 18px;
    background: linear-gradient(180deg, #fffdf5, #ffffff);
    box-shadow: 0 0 12px rgba(255,193,7,0.35);
    transition: all 0.3s ease;
}
.menu-utama:hover{
    transform: translateY(-2px);
    box-shadow: 0 0 18px rgba(255,193,7,0.55);
}
    </style>
</head>
    
<body>
<div class="main-content">
<div class="container">
    <div class="robot-wrapper">
        <img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
    </div>
<h1>CIKUR GO</h1>

<div class="hero-tag">LAYANAN UTAMA</div>

<h2 class="hero-title">CIKUR GO ASSISTANT</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>
    <h3 style="margin-bottom:20px;color:#FFC107;font-weight:600;">
Layanan Kami
    </h3>
    
<div class="menu-grid">
    <!-- ASSISTANT -->
    <a href="assistant.html" class="menu-item">
        <img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
        <span>ASSISTANT</span>
    </a>
    <!-- FOOD -->
    <a href="food.html" class="menu-item">
        <img src="cikurgofood.png" alt="FOOD">
        <span>FOOD</span>
    </a>
    <!-- RIDE -->
    <a href="ride.html" class="menu-item">
        <img src="cikurgoride.png" alt="RIDE">
        <span>RIDE</span>
    </a>
</div>
    <button id="chatBtn">
💬 Mulai Chat
    </button>
</div>
    </div> <!-- akhir main-content -->
<footer>
© 2026 CIKUR GO<br>
Pasti Mudah, Pasti Nyaman.
</footer>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>
<script>
    const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

window.botpress.open();

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});
</script>
</body>
</html>
