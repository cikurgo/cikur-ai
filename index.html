<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGO</title>

<!-- Google Fonts: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset Dasar */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
}

/* Gaya Halaman Utama - Gradasi Premium */
body{
background:linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
padding: 20px;
}

/* Kontainer Utama */
.container{
max-width:700px;
padding:30px;
}

/* Gaya Logo CGO - Animasi Melayang Diaktifkan */
.logo-img {
width: 250px;
margin-bottom:30px;
/* Efek cahaya neon halus */
filter: drop-shadow(0 0 15px rgba(255, 193, 7, 0.7));
/* --- BARIS INI YANG PENTING --- */
/* Animasi melayang pelan: nama float, durasi 4s, kecepatan ease-in-out, ulang terus infinite */
animation: float 4s ease-in-out infinite;
/* -------------------------------- */
max-width: 100%;
height: auto;
}

/* Judul CGO */
h1{
font-size:56px;
margin-bottom:15px;
color:#FFC107;
font-weight: 700;
}

/* Deskripsi */
p{
font-size:18px;
line-height:1.8;
margin-bottom:40px;
font-weight: 300;
opacity: 0.9;
}

/* Tombol */
button{
background:#FFC107;
color:#111;
border:none;
padding:18px 50px;
font-size:19px;
border-radius:50px;
cursor:pointer;
font-weight:600;
transition: all .4s ease;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Tombol Saat Hover */
button:hover{
transform:translateY(-5px);
background-color: #ffca2c;
box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
}

/* Footer Copyright */
footer {
position: fixed;
bottom: 10px;
width: 100%;
text-align: center;
font-size: 12px;
opacity: 0.5;
}

/* --- Definisi Animasi Melayang --- */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-15px); } /* Gambar naik 15px di tengah animasi */
100% { transform: translateY(0px); }
}

/* --- Responsif untuk Mobile --- */
@media (max-width: 600px) {
h1 { font-size: 40px; }
p { font-size: 16px; }
button { padding: 16px 40px; font-size: 17px; }
.logo-img { width: 180px; }
}
</style>

</head>

<body>

<div class="container">

<!-- Menampilkan Logo CGO -->
<img src="cgo.png" alt="Logo CGO" class="logo-img">

<h1>CGO</h1>

<p>
Asisten Virtual Resmi CIKUR GO.<br>
Siap membantu pelanggan, mitra, dan operasional perusahaan secara cepat, mudah, dan profesional.
</p>

<button onclick="window.botpress.open();">
Mulai Chat
</button>

</div>

<footer>
    &copy; 2026 CIKUR GO. All rights reserved.
</footer>

<!-- Skrip Injeksi Botpress -->
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

</body>
</html>
