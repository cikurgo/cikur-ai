<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:430px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:16px 18px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.robot-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:6px;
}

.logo-img{
    width:90px;
    height:auto;
    animation:breathe 4s ease-in-out infinite;
}

h1{
    font-size:30px;
    font-weight:700;
    color:#FFC107;
    margin:2px 0 6px;
}

.hero-tag{
    display:inline-block;
    padding:6px 16px;
    background:rgba(255,193,7,.15);
    border:1px solid rgba(255,193,7,.4);
    color:#FFC107;
    border-radius:30px;
    font-size:13px;
    font-weight:600;
    margin-bottom:8px;
}

.hero-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:6px;
}

.hero-desc{
    font-size:14px;
    color:#ddd;
    margin-bottom:4px;
}

.hero-info{
    font-size:12px;
    color:#bdbdbd;
    line-height:1.5;
    margin-bottom:10px;
}
   /* ========================= */
/* BANNER */
/* ========================= */

.hero-banner{
    width:92%;
    margin:10px auto 12px;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
}

.hero-banner img{
    width:100%;
    display:block;
    border-radius:16px;
}

/* ========================= */
/* JUDUL MENU */
/* ========================= */

.menu-title{
    color:#FFC107;
    font-size:18px;
    font-weight:700;
    margin:10px 0 14px;
}

/* ========================= */
/* MENU LAYANAN */
/* ========================= */

.menu-grid{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:16px;
}

.menu-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:#fff;
    transition:.25s;
}

.menu-item:hover{
    transform:translateY(-4px);
}

.menu-item img{
    width:68px;
    height:68px;
    background:#fff;
    border-radius:18px;
    border:2px solid #FFC107;
    padding:8px;
    transition:.25s;
}

.menu-item:hover img{
    transform:scale(1.06);
    box-shadow:0 0 18px rgba(255,193,7,.45);
}

.menu-item span{
    margin-top:8px;
    font-size:11px;
    font-weight:600;
}
.assistant-icon{
    animation:assistantPulse 2.5s infinite;
}
/* ========================= */
/* BUTTON */
/* ========================= */

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:17px;
    font-weight:700;
    color:#000;
    background:linear-gradient(45deg,#FFC107,#FFD54F);
    box-shadow:0 10px 20px rgba(255,193,7,.25);
    transition:.25s;
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 24px rgba(255,193,7,.35);
} 
    /* ========================= */
/* FOOTER */
/* ========================= */

footer{
    margin-top:14px;
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,.65);
    line-height:1.5;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes breathe{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1.05);
}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width:430px){

body{
padding:8px;
}

.container{
max-width:100%;
padding:14px 16px;
}

.logo-img{
width:82px;
}

h1{
font-size:28px;
}

.hero-title{
font-size:22px;
}

.hero-desc{
font-size:13px;
}

.hero-info{
font-size:12px;
}

.hero-banner{
width:94%;
margin:8px auto 10px;
}

.menu-title{
font-size:17px;
margin:8px 0 10px;
}

.menu-grid{
gap:10px;
margin-bottom:14px;
}

.menu-item img{
width:64px;
height:64px;
}

.menu-item span{
font-size:11px;
}

button{
height:48px;
font-size:16px;
}

footer{
font-size:10px;
margin-top:10px;
}

}
</style>
</head>

<body>

<div class="container">
<div class="robot-wrapper">
<img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
</div>

<h1>CIKUR GO</h1>

<div class="hero-tag">
LAYANAN UTAMA
</div>

<h2 class="hero-title">
CIKUR GO ASSISTANT
</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>
    
<div class="hero-banner">
    <img src="bannercgo.png" alt="Banner CIKUR GO">
</div>
    
<div class="menu-title">
Layanan Kami
</div>

<div class="menu-grid">

<a href="assistant.html" class="menu-item">
<img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
<span>ASSISTANT</span>
</a>

<a href="food.html" class="menu-item">
<img src="cikurgofood.png" alt="FOOD">
<span>FOOD</span>
</a>

<a href="ride.html" class="menu-item">
<img src="cikurgoride.png" alt="RIDE">
<span>RIDE</span>
</a>

</div>
<button id="chatBtn">
💬 Mulai Chat
</button>

<footer>
© 2026 CIKUR GO
<br>
Pasti Mudah, Pasti Nyaman.
</footer>
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

<script>

const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});

</script>

</body>
</html>
