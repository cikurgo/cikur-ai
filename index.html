<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
    overflow:hidden;
}

/* ===========================
   LAYOUT UTAMA
=========================== */

.container{
    width:100%;
    max-width:430px;
    margin:auto;
    padding:18px 20px;
    text-align:center;

    background:rgba(255,255,255,.04);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

/* Logo */

.logo-img{
    width:105px;
    margin:0 auto 10px;
    display:block;
}

/* Judul */

h1{
    font-size:32px;
    font-weight:800;
    color:#FFC107;
    margin:0 0 8px;
}

/* Badge */

.hero-tag{
    display:inline-block;
    padding:8px 24px;
    margin-bottom:12px;

    border-radius:999px;

    background:rgba(255,193,7,.18);
    border:1px solid rgba(255,193,7,.45);

    color:#FFC107;
    font-size:15px;
    font-weight:700;
}

/* Judul Assistant */

.hero-title{
    font-size:24px;
    font-weight:800;
    color:#fff;
    margin:0 0 8px;
}

/* Deskripsi */

.hero-desc{
    font-size:15px;
    color:#E6E6E6;
    line-height:1.45;
    margin-bottom:6px;
}

/* Info */

.hero-info{
    font-size:13px;
    color:#BFBFBF;
    line-height:1.55;
    margin-bottom:12px;
}

.menu-item span{
    margin-top:8px;
    font-size:11px;
    font-weight:600;
}
.assistant-icon{
    animation:assistantPulse 2.5s infinite;
}
/* ========================= */
/* BUTTON */
/* ========================= */

button{
    width:100%;
    height:48px;
    font-size:17px;
    margin-top:4px;
    border:none;
    border-radius:30px;
}
button:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 24px rgba(255,193,7,.35);
} 
    /* ========================= */
/* FOOTER */
/* ========================= */

footer{
    margin-top:6px;
    font-size:11px;
    line-height:1.4;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes breathe{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1.05);
}

}

/* ========================= */
/* MOBILE */
/* ========================= */

@media (max-width:430px){

.container{
    max-width:100%;
    margin:12px;
    padding:16px;
    border-radius:24px;
}

.logo-img{
    width:92px;
}

h1{
    font-size:30px;
}

.hero-tag{
    font-size:14px;
    padding:8px 20px;
}

.hero-title{
    font-size:22px;
}

.hero-desc{
    font-size:15px;
}

.hero-info{
    font-size:13px;
    line-height:1.45;
}

.hero-banner{
    margin:10px 0 12px;
}

.menu-title{
    font-size:17px;
    margin:10px 0 14px;
}

.menu-grid{
    gap:12px;
    margin-bottom:16px;
}

.menu-item img{
    width:68px;
    height:68px;
}

.menu-item span{
    font-size:12px;
}

button{
    padding:14px 0;
    font-size:18px;
}

footer{
    margin-top:8px;
    font-size:12px;
    line-height:1.35;
}

}
/* ===========================
   BANNER
=========================== */

.hero-banner{
    width:100%;
    margin:12px auto 14px;
}

.hero-banner img{
    display:block;
    width:100%;
    height:auto;
    border-radius:18px;
}

/* ===========================
   JUDUL MENU
=========================== */

.menu-title{
    font-size:18px;
    font-weight:700;
    color:#FFC107;
    margin:14px 0 16px;
}

/* ===========================
   MENU LAYANAN
=========================== */

.menu-grid{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    margin-bottom:18px;
}

.menu-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:#fff;
}

.menu-item img{
    width:74px;
    height:74px;

    background:#fff;
    border:2px solid #FFC107;
    border-radius:20px;

    padding:10px;
    transition:.25s;
}

.menu-item span{
    margin-top:10px;
    font-size:13px;
    font-weight:700;
    letter-spacing:.3px;
}

footer{
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="robot-wrapper">
<img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
</div>

<h1>CIKUR GO</h1>

<div class="hero-tag">
LAYANAN UTAMA
</div>

<h2 class="hero-title">
CIKUR GO ASSISTANT
</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>
    
<div class="hero-banner">
    <img src="bannercgo.png" alt="Banner CIKUR GO">
</div>
    
<div class="menu-title">
Layanan Kami
</div>

<div class="menu-grid">

<a href="assistant.html" class="menu-item">
<img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
<span>ASSISTANT</span>
</a>

<a href="food.html" class="menu-item">
<img src="cikurgofood.png" alt="FOOD">
<span>FOOD</span>
</a>

<a href="ride.html" class="menu-item">
<img src="cikurgoride.png" alt="RIDE">
<span>RIDE</span>
</a>

</div>
<button id="chatBtn">
💬 Mulai Chat
</button>

<footer>
© 2026 CIKUR GO
<br>
Pasti Mudah, Pasti Nyaman.
</footer>
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

<script>

const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});

</script>

</body>
</html>
