<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:16px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:430px;
background:rgba(255,255,255,.04);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
padding:26px 22px;
text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.45);
animation:fadeUp .7s ease;
}

.logo-img{
width:145px;
display:block;
margin:0 auto 10px;
animation:breathe 4s ease-in-out infinite;
}

h1{
font-size:38px;
font-weight:800;
color:#FFC107;
margin-bottom:4px;
letter-spacing:1px;
}

.hero-tag{
display:inline-block;
padding:6px 14px;
background:rgba(255,193,7,.15);
border:1px solid rgba(255,193,7,.35);
border-radius:30px;
color:#FFC107;
font-size:12px;
font-weight:700;
margin:8px 0 16px;
}

.hero-title{
font-size:24px;
font-weight:700;
margin-bottom:10px;
}

.hero-desc{
font-size:14px;
color:#ddd;
line-height:1.6;
margin-bottom:8px;
}

.hero-info{
font-size:13px;
color:#aaa;
line-height:1.6;
margin-bottom:22px;
}

.menu-title{
font-size:18px;
font-weight:700;
color:#FFC107;
margin-bottom:18px;
}

.menu-grid{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:24px;
}

.menu-item{
text-decoration:none;
color:#fff;
display:flex;
flex-direction:column;
align-items:center;
width:84px;
transition:.25s;
}

.menu-item:hover{
transform:translateY(-4px);
}

.menu-item img{
width:72px;
height:72px;
border-radius:18px;
background:#fff;
padding:8px;
border:2px solid #FFC107;
transition:.25s;
}

.menu-item:hover img{
transform:scale(1.05);
box-shadow:0 0 18px rgba(255,193,7,.45);
}

.menu-item span{
margin-top:10px;
font-size:12px;
font-weight:600;
}

.assistant-icon{
animation:assistantPulse 2.5s infinite;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#FFC107,#FFD95A);
color:#000;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
box-shadow:0 10px 25px rgba(255,193,7,.25);
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(255,193,7,.35);
}

footer{
margin-top:18px;
font-size:11px;
opacity:.55;
line-height:1.6;
text-align:center;
}

@keyframes breathe{

0%{
transform:scale(1) rotate(0deg);
}

25%{
transform:scale(1.01) rotate(.8deg);
}

50%{
transform:scale(1.03) rotate(0deg);
}

75%{
transform:scale(1.01) rotate(-.8deg);
}

100%{
transform:scale(1) rotate(0deg);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1.05);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:420px){

.container{
padding:22px 18px;
}

.logo-img{
width:130px;
}

h1{
font-size:34px;
}

.hero-title{
font-size:22px;
}

.menu-grid{
gap:12px;
}

.menu-item{
width:78px;
}

.menu-item img{
width:66px;
height:66px;
}

}
/* ===== CGO ROBOT FLOAT ===== */

.cgo-float{
position:fixed;
right:18px;
bottom:18px;
z-index:9999;
cursor:pointer;
animation:cgoIdle 4s ease-in-out infinite;
}

.cgo-float img{
width:72px;
filter:drop-shadow(0 0 12px rgba(255,193,7,.45));
transition:.25s;
}

.cgo-float:hover img{
transform:scale(1.08);
}

.cgo-bubble{
position:absolute;
bottom:82px;
right:0;
background:#fff;
color:#222;
padding:10px 14px;
border-radius:18px;
font-size:13px;
font-weight:600;
white-space:nowrap;
box-shadow:0 10px 25px rgba(0,0,0,.25);
opacity:0;
transform:translateY(10px);
transition:.35s;
}

.cgo-float.show .cgo-bubble{
opacity:1;
transform:translateY(0);
}

@keyframes cgoIdle{

0%{
transform:translateY(0) rotate(0deg);
}

25%{
transform:translateY(-3px) rotate(-2deg);
}

50%{
transform:translateY(0) rotate(0deg);
}

75%{
transform:translateY(-3px) rotate(2deg);
}

100%{
transform:translateY(0) rotate(0deg);
}

}
</style>
</head>

<body>

<div class="container">

<div class="robot-wrapper">
<img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
</div>

<h1>CIKUR GO</h1>

<div class="hero-tag">
LAYANAN UTAMA
</div>

<h2 class="hero-title">
CIKUR GO ASSISTANT
</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>

<div class="menu-title">
Layanan Kami
</div>

<div class="menu-grid">

<a href="assistant.html" class="menu-item">
<img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
<span>ASSISTANT</span>
</a>

<a href="food.html" class="menu-item">
<img src="cikurgofood.png" alt="FOOD">
<span>FOOD</span>
</a>

<a href="ride.html" class="menu-item">
<img src="cikurgoride.png" alt="RIDE">
<span>RIDE</span>
</a>

</div>

<button id="chatBtn">
💬 Mulai Chat
</button>
<div class="cgo-float" id="cgoRobot">

<div class="cgo-bubble">
👋 Hai, butuh bantuan?
</div>

<img src="cgorobot.png" alt="CGO Robot">

</div>
<footer>
© 2026 CIKUR GO
<br>
Pasti Mudah, Pasti Nyaman.
</footer>
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

<script>

const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{
const robot=document.getElementById("cgoRobot");

setTimeout(()=>{
robot.classList.add("show");
},1500);

setTimeout(()=>{
robot.classList.remove("show");
},6000);

robot.addEventListener("click",()=>{

robot.querySelector(".cgo-bubble").innerHTML="💬 Membuka Chat...";

if(window.botpress){
window.botpress.open();
}

});
btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});

</script>

</body>
</html>
