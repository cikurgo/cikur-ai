<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGO - Asisten Virtual CIKUR GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at center, #2d2d2d 0%, #111 100%); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            overflow-x: hidden; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            max-width: 500px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        .robot-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        .logo-img{
width:180px;
height:auto;
animation:float 4s ease-in-out infinite;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}
        h1 { font-size: 48px; margin: 10px 0; color: #FFC107; text-shadow: 0 0 20px rgba(255, 193, 7, 0.3); }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 30px; color: #ccc; }
        
        /* Menu Grid Style */
        .menu-grid { display: flex; justify-content: space-around; margin-bottom: 30px; }
        .menu-item{
text-decoration:none;
color:white;
width:30%;
transition:.3s;
}

.menu-item:hover{
transform:translateY(-6px);
}

.menu-item img{
width:60px;
height:60px;
border-radius:15px;
display:block;
margin:0 auto 10px auto;
border:2px solid #FFC107;
background:white;
padding:8px;
transition:.3s;
}

.menu-item:hover img{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,193,7,.6);
}
        .menu-item img { width: 60px; height: 60px; border-radius: 15px; display: block; margin: 0 auto 10px auto; border: 2px solid #FFC107; background-color: white; padding: 8px; }
        .menu-item span { font-size: 12px; font-weight: 600; }

        button { 
            background: linear-gradient(45deg, #FFC107, #ffdb58); 
            color: #000; 
            border: none; 
            padding: 18px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.2); 
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 193, 7, 0.4); }
        footer { position: fixed; bottom: 15px; font-size: 11px; opacity: 0.4; }
        
        @media (max-width: 600px) { .container { padding: 30px 20px; } h1 { font-size: 36px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="robot-wrapper">
        <img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
    </div>
    <h1>CIKUR GO</h1>
    <p>
Platform layanan resmi CIKUR GO yang menghadirkan berbagai solusi dalam satu ekosistem.<br><br>
Pilih layanan yang Anda butuhkan atau mulai percakapan bersama Asisten Virtual CIKUR GO.
    </p>

    <h3 style="margin-bottom:20px;color:#FFC107;font-weight:600;">
Layanan Kami
</h3>

<!-- Menu Baru -->
    <div class="menu-grid">
        <a href="LINK_FOOD" class="menu-item">
            <img src="cikurgofood.png" alt="FOOD">
            <span>FOOD</span>
        </a>
        <a href="LINK_RIDE" class="menu-item">
            <img src="cikurgoride.png" alt="RIDE">
            <span>RIDE</span>
        </a>
        <a href="LINK_ASSIST" class="menu-item">
            <img src="cikurgoassistant.png" alt="ASSISTANT">
            <span>ASSISTANT</span>
        </a>
    </div>

    <button id="chatBtn">
💬 Mulai Chat
    </button>
</div>

<footer>
© 2026 CIKUR GO<br>
Pasti Mudah, Pasti Nyaman.
</footer>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>
<script>
    const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

window.botpress.open();

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});
</script>
</body>
</html>
