<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIKUR AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #111; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .container { max-width: 700px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .logo-img { width: 200px; margin-bottom: 25px; display: block; margin-left: auto; margin-right: auto; }
        h1 { font-size: 48px; color: #FFC107; margin-bottom: 15px; }
        p { font-size: 16px; opacity: 0.8; margin-bottom: 30px; line-height: 1.6; }
        button { background: #FFC107; color: #111; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #ffca2c; }
        footer { margin-top: auto; padding: 20px; font-size: 12px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <img src="cgo.png" alt="Logo CGO" class="logo-img">
    <h1>CIKUR AI</h1>
    <p>
        Asisten Virtual Resmi CIKUR GO.<br>
        Siap membantu pelanggan, mitra, dan operasional perusahaan secara cepat, mudah, dan profesional.
    </p>
    <button onclick="window.botpress.open();">Mulai Chat</button>
</div>

<footer>
    &copy; 2026 CIKUR GO. All rights reserved.
</footer>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

</body>
</html>
