<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGO - Asisten Virtual CIKUR GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: radial-gradient(circle at center, #2d2d2d 0%, #111 100%); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            overflow-x: hidden; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 40px; 
            border-radius: 30px; 
            text-align: center; 
            max-width: 500px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        .robot-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        .robot-img { 
            width: 220px; 
            animation: float 4s ease-in-out infinite, breathe 5s ease-in-out infinite; 
            filter: drop-shadow(0 0 20px rgba(255,193,7,.2)); 
        }
        h1 { font-size: 48px; margin: 10px 0; color: #FFC107; text-shadow: 0 0 20px rgba(255, 193, 7, 0.3); }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 30px; color: #ccc; }
        button { 
            background: linear-gradient(45deg, #FFC107, #ffdb58); 
            color: #000; 
            border: none; 
            padding: 18px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 700; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.2); 
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255, 193, 7, 0.4); }
        footer { position: fixed; bottom: 15px; font-size: 11px; opacity: 0.4; }
        
        /* Animasi */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .blink { animation: blink .18s linear; }
        @keyframes blink { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(.05); } }
        .robot-wave { transform: rotate(-5deg) scale(1.05); transition: 0.2s; }
        
        @media (max-width: 600px) { .container { padding: 30px 20px; } h1 { font-size: 36px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="robot-wrapper">
        <img src="robot.png" id="robot" class="robot-img" alt="CIKUR AI">
    </div>
    <h1>CGO</h1>
    <p>
        Asisten Virtual Resmi CIKUR GO.<br>
        Siap membantu pelanggan, mitra, dan operasional perusahaan secara cepat, mudah, dan profesional.
    </p>
    <button id="chatBtn">Mulai Chat</button>
</div>

<footer>&copy; 2026 CIKUR GO. All rights reserved.</footer>

<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>
<script>
    const robot = document.getElementById("robot");
    function autoBlink() {
        robot.classList.add("blink");
        setTimeout(() => { robot.classList.remove("blink"); }, 180);
    }
    function randomBlink() {
        let t = Math.random() * 3000 + 2500;
        setTimeout(() => { autoBlink(); randomBlink(); }, t);
    }
    randomBlink();

    const btn = document.getElementById("chatBtn");
    btn.addEventListener("click", () => {
        robot.classList.add("robot-wave");
        setTimeout(() => { robot.classList.remove("robot-wave"); }, 400);
        window.botpress.open();
    });
</script>
</body>
</html>
