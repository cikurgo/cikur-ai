<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    overflow-x:hidden;
    overflow-y:auto;
}
/* ===========================
   LAYOUT UTAMA
=========================== */

.container{
    width:100%;
    max-width:430px;
    margin:0 auto;
    padding:18px 18px 22px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.logo-img{
    width:105px;
    display:block;
    margin:0 auto 10px;
}

h1{
    font-size:32px;
    font-weight:800;
    color:#FFC107;
    margin:0 0 10px;
}

.hero-tag{
    display:inline-block;
    padding:8px 22px;
    margin:0 auto 14px;
    border-radius:999px;
    background:rgba(255,193,7,.15);
    border:1px solid rgba(255,193,7,.35);
    color:#FFC107;
    font-size:14px;
    font-weight:700;
}

.hero-title{
    font-size:24px;
    font-weight:800;
    color:#fff;
    margin:0 0 10px;
}

.hero-desc{
    font-size:15px;
    line-height:1.55;
    color:#ececec;
    margin:0 0 8px;
}

.hero-info{
    font-size:13px;
    line-height:1.5;
    color:#bdbdbd;
    margin:0 0 12px;
}

.menu-item span{
    margin-top:8px;
    font-size:11px;
    font-weight:600;
}
.assistant-icon{
    animation:assistantPulse 2.5s infinite;
}
/* ===== Tombol ===== */

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:40px;
    margin:8px 0 18px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    background:linear-gradient(90deg,#FFC107,#FFD95A);
    color:#111;
    transition:.3s;
    box-shadow:0 10px 25px rgba(255,193,7,.25);
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 15px 30px rgba(255,193,7,.35);
}


/* ===== Footer ===== */

footer{
    text-align:center;
    margin-top:0;
    padding:0 0 4px;
    color:#bdbdbd;
    font-size:12px;
    line-height:1.4;
}

footer p{
    margin:0;
}
/* ========================= */
/* ANIMATION */
/* ========================= */

@keyframes breathe{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-6px);
}

100%{
transform:translateY(0px);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1.05);
}

}

/* ===========================
   RESPONSIVE FINAL CIKUR GO
=========================== */

@media screen and (max-width:430px){

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:10px;
    overflow-x:hidden;
    overflow-y:auto;
}

.container{
    width:100%;
    max-width:420px;
    padding:16px;
    border-radius:24px;
}

.logo-img{
    width:96px;
}

h1{
    font-size:30px;
}

.hero-tag{
    font-size:13px;
    padding:7px 18px;
}

.hero-title{
    font-size:22px;
}

.hero-desc{
    font-size:14px;
}

.hero-info{
    font-size:12px;
}

.hero-banner{
    margin:10px auto 12px;
}

.hero-banner img{
    width:100%;
    border-radius:16px;
}

.menu-title{
    margin:8px 0 12px;
    font-size:17px;
}

.menu-grid{
    gap:10px;
    margin-bottom:14px;
}

.menu-item{
    width:84px;
}

.menu-item img{
    width:68px;
    height:68px;
}

.menu-item span{
    font-size:12px;
}

button{
    width:100%;
    height:52px;
    font-size:17px;
    margin:8px 0 10px;
}

footer{
    margin-top:8px;
    padding-bottom:0;
    font-size:12px;
    line-height:1.4;
}
}

/* ===== Banner ===== */

.hero-banner{
    width:100%;
    margin:14px auto 16px;
}

.hero-banner img{
    display:block;
    width:100%;
    max-width:360px;
    height:auto;
    margin:0 auto;
    border-radius:18px;
}


/* ===== Judul Menu ===== */

.menu-title{
    font-size:18px;
    font-weight:700;
    color:#FFC107;
    margin:10px 0 14px;
}


/* ===== Menu ===== */

.menu-grid{
    display:flex;
    justify-content:space-evenly;
    align-items:flex-start;
    gap:10px;
    margin-bottom:18px;
}

.menu-item{
    width:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:#fff;
}

.menu-item img{
    width:74px;
    height:74px;
    background:#fff;
    border:2px solid #FFC107;
    border-radius:20px;
    padding:10px;
    transition:.25s;
}

.menu-item span{
    margin-top:8px;
    font-size:14px;
    font-weight:600;
}

footer{
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">
<div class="robot-wrapper">
<img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
</div>

<h1>CIKUR GO</h1>

<div class="hero-tag">
LAYANAN UTAMA
</div>

<h2 class="hero-title">
CIKUR GO ASSISTANT
</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>
    
<div class="hero-banner">

    <div class="banner-slider">

        <img src="bannercgo1.png" class="slide active" alt="Banner 1">

        <img src="bannercgo2.png" class="slide" alt="Banner 2">

        <img src="bannercgo3.png" class="slide" alt="Banner 3">

    </div>

    <div class="banner-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

</div>
    
<div class="menu-title">
Layanan Kami
</div>

<div class="menu-grid">

<a href="assistant.html" class="menu-item">
<img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
<span>ASSISTANT</span>
</a>

<a href="food.html" class="menu-item">
<img src="cikurgofood.png" alt="FOOD">
<span>FOOD</span>
</a>

<a href="ride.html" class="menu-item">
<img src="cikurgoride.png" alt="RIDE">
<span>RIDE</span>
</a>

</div>
<button id="chatBtn">
💬 Mulai Chat
</button>

<footer>
© 2026 CIKUR GO
<br>
Pasti Mudah, Pasti Nyaman.
</footer>
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

<script>

const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});

</script>

</body>
</html>
