<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIKUR AI</title>

<!-- Google Fonts: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset Dasar */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Poppins', sans-serif; /* Menggunakan font Poppins yang lebih modern */
}

/* Gaya Halaman Utama */
body{
background:linear-gradient(135deg,#111,#1f1f1f); /* Gradasi gelap premium */
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
padding: 20px;
}

/* Kontainer Utama */
.container{
max-width:700px;
padding:30px;
/* Animasi fade-in saat halaman dimuat */
animation: fadeIn 1s ease-out;
}

/* Gaya Logo CGO */
.logo-img {
/* Menggunakan gambar logo dari KA_20260708_205618_0000.jpg */
width: 250px; /* Ukuran logo disesuaikan agar lebih proporsional */
margin-bottom:30px;
/* Efek cahaya neon halus di sekeliling logo */
filter: drop-shadow(0 0 12px rgba(255, 193, 7, 0.5));
/* Animasi melayang pelan */
animation: float 4s ease-in-out infinite;
/* Mencegah logo terpotong jika terlalu besar di mobile */
max-width: 100%;
height: auto;
}

/* Gaya Judul */
h1{
font-size:56px;
margin-bottom:15px;
color:#FFC107; /* Warna aksen kuning khas */
font-weight: 700;
/* Animasi geser ke atas saat dimuat */
animation: slideUp 1s ease-out forwards;
opacity: 0;
}

/* Gaya Deskripsi */
p{
font-size:18px;
line-height:1.8;
opacity:.9;
margin-bottom:40px;
font-weight: 300;
animation: slideUp 1s ease-out 0.3s forwards;
opacity: 0;
}

/* Gaya Tombol */
button{
background:#FFC107;
color:#111;
border:none;
padding:18px 50px;
font-size:19px;
border-radius:50px;
cursor:pointer;
font-weight:600;
/* Transisi halus untuk semua properti */
transition: all .4s ease;
/* Sedikit bayangan pada tombol */
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Gaya Tombol Saat Hover */
button:hover{
transform:translateY(-5px); /* Tombol terangkat ke atas */
background-color: #ffca2c; /* Warna sedikit lebih terang */
box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4);
}

/* --- Definisi Keyframes Animasi --- */

/* Animasi untuk container keseluruhan */
@keyframes fadeIn {
from { opacity: 0; }
to { opacity: 1; }
}

/* Animasi untuk logo melayang */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-15px); }
100% { transform: translateY(0px); }
}

/* Animasi untuk slide-up elemen teks */
@keyframes slideUp {
from { transform: translateY(30px); opacity: 0; }
to { transform: translateY(0px); opacity: 1; }
}

/* --- Responsif untuk Mobile --- */
@media (max-width: 600px) {
h1 { font-size: 40px; }
p { font-size: 16px; }
button { padding: 16px 40px; font-size: 17px; }
.logo-img { width: 180px; } /* Logo sedikit lebih kecil di mobile */
}

</style>

</head>

<body>

<div class="container">

<!-- Menampilkan Logo CGO dari KA_20260708_205618_0000.jpg -->
<img src="https://raw.githubusercontent.com/cikurgo/cikur-ai/main/cgo.png" alt="Logo CGO CIKUR AI" class="logo-img">

<h1>CIKUR AI</h1>

<p>
Asisten Virtual Resmi CIKUR GO.<br>
Siap membantu pelanggan, mitra, dan operasional perusahaan secara cepat, mudah, dan profesional.
</p>

<button onclick="window.botpress.open();">
Mulai Chat
</button>

</div>

<!-- Skrip Injeksi Botpress (Pastikan sudah benar) -->
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

</body>
</html>
