<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    background: radial-gradient(circle at center,#2d2d2d 0%,#111 100%);
    color:#fff;
    margin:0;
    padding:8px;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.08);
    padding:12px 18px;
    border-radius:28px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}
.logo-img{
    width:85px;
    margin-bottom:6px;
}

h1{
    font-size:30px;
    margin:2px 0 6px;
}

.hero-tag{
    margin:6px auto;
    padding:8px 18px;
    font-size:15px;
}

.hero-title{
    font-size:24px;
    margin:8px 0;
}
.hero-desc{
    font-size:15px;
    margin-bottom:6px;
}

.hero-info{
    font-size:13px;
    margin-bottom:10px;
}

.menu-title{
    margin:8px 0 12px;
    font-size:18px;
}

.menu-grid{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:18px;
    margin:18px 0;
}

.menu-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:#fff;
}

.menu-item:hover{
transform:translateY(-4px);
}

.menu-item img{
width:72px;
height:72px;
border-radius:18px;
background:#fff;
padding:8px;
border:2px solid #FFC107;
transition:.25s;
}

.menu-item:hover img{
transform:scale(1.05);
box-shadow:0 0 18px rgba(255,193,7,.45);
}

.menu-item span{
margin-top:10px;
font-size:12px;
font-weight:600;
}

.assistant-icon{
animation:assistantPulse 2.5s infinite;
}

button{
    width:100%;
    padding:14px 0;
    font-size:18px;
    margin-top:8px;
    border:none;
    border-radius:40px;
    cursor:pointer;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(255,193,7,.35);
}

footer{
    margin-top:8px;
    font-size:11px;
    line-height:1.3;
}

@keyframes breathe{

0%{
transform:scale(1) rotate(0deg);
}

25%{
transform:scale(1.01) rotate(.8deg);
}

50%{
transform:scale(1.03) rotate(0deg);
}

75%{
transform:scale(1.01) rotate(-.8deg);
}

100%{
transform:scale(1) rotate(0deg);
}

}

@keyframes assistantPulse{

0%{
transform:scale(1.05);
}

50%{
transform:scale(1.12);
}

100%{
transform:scale(1.05);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:420px){

.container{
    padding:14px 18px;
}

.logo-img{
width:130px;
}

h1{
font-size:34px;
}

.hero-title{
font-size:22px;
}

.menu-grid{
gap:12px;
}

.menu-item{
width:78px;
}

.menu-item img{
width:66px;
height:66px;
}

}
/* ===== BANNER ===== */

.hero-banner{
    width:88%;
    margin:8px auto;
}

.hero-banner img{
    width:100%;
    height:auto;
    display:block;
}
</style>
</head>

<body>

<div class="container">
<div class="robot-wrapper">
<img src="cikurgoicon.png" class="logo-img" alt="CIKUR GO">
</div>

<h1>CIKUR GO</h1>

<div class="hero-tag">
LAYANAN UTAMA
</div>

<h2 class="hero-title">
CIKUR GO ASSISTANT
</h2>

<p class="hero-desc">
Pendamping profesional untuk aktivitas harian Anda.
</p>

<p class="hero-info">
Didukung oleh <strong>CIKUR GO FOOD</strong> dan
<strong>CIKUR GO RIDE</strong> dalam satu ekosistem.
</p>
    
<div class="hero-banner">
    <img src="bannercgo.png" alt="Banner CIKUR GO">
</div>
    
<div class="menu-title">
Layanan Kami
</div>

<div class="menu-grid">

<a href="assistant.html" class="menu-item">
<img src="cikurgoassistant.png" class="assistant-icon" alt="ASSISTANT">
<span>ASSISTANT</span>
</a>

<a href="food.html" class="menu-item">
<img src="cikurgofood.png" alt="FOOD">
<span>FOOD</span>
</a>

<a href="ride.html" class="menu-item">
<img src="cikurgoride.png" alt="RIDE">
<span>RIDE</span>
</a>

</div>
<button id="chatBtn">
💬 Mulai Chat
</button>

<footer>
© 2026 CIKUR GO
<br>
Pasti Mudah, Pasti Nyaman.
</footer>
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script src="https://files.bpcontent.cloud/2026/07/15/02/20260715020640-8DLE30VX.js" defer></script>

<script>

const btn=document.getElementById("chatBtn");

btn.addEventListener("click",()=>{

btn.disabled=true;

btn.innerHTML="Membuka CIKUR GO...";

setTimeout(()=>{

if(window.botpress){
window.botpress.open();
}

btn.disabled=false;

btn.innerHTML="💬 Mulai Chat";

},500);

});

</script>

</body>
</html>
