<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CIKUR GO - ASSISTANT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    radial-gradient(circle at top,#3a3a3a 0%,#1d1d1d 35%,#111111 100%);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:#ffffff;
    overflow:auto;
}

.container{
    position:relative;
    width:min(100%,420px);
    min-height:auto;
    max-height:calc(100vh - 30px);
    overflow-y:auto;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:24px 20px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    animation:fadeUp .8s ease;
}

.glow{
    position:absolute;
    width:180px;
    height:180px;
    background:#FFC107;
    border-radius:50%;
    filter:blur(80px);
    opacity:.18;
    left:50%;
    transform:translateX(-50%);
    top:120px;
    z-index:0;
}

.logo{
    width:60px;
    margin:0 auto 12px;
}

.logo img{
    width:100%;
}

h1{
    font-size:clamp(22px,5vw,28px);
    font-weight:800;
    color:#FFC107;
    margin-bottom:8px;
}

.subtitle{
    font-size:14px;
    line-height:1.5;
    margin-bottom:18px;
}

.assistant{
    position:relative;
    z-index:2;
    width:120px;
    max-width:35vw;
    margin:18px auto;
    animation:breathe 3.5s ease-in-out infinite;
}

.assistant img{
    width:100%;
    display:block;
    filter:
        drop-shadow(0 0 2px #fff)
        drop-shadow(0 0 6px rgba(255,255,255,.8))
        drop-shadow(0 0 10px rgba(255,193,7,.35));
}

.features{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:18px;
}

.feature{
    padding:10px 16px;
    border-radius:30px;
    font-size:14px;
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    font-size:15px;
    margin-bottom:10px;
    border-radius:50px;
    text-decoration:none;
    transition:.3s;
}

.btn-order{
    background:linear-gradient(45deg,#FFC107,#FFD54F);
    color:#111;
    box-shadow:0 8px 20px rgba(255,193,7,.35);
}

.btn-order:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 28px rgba(255,193,7,.45);
}

.btn-chat{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    color:#ffffff;
}

.btn-chat:hover{
    background:rgba(255,255,255,.14);
}

.back{
    display:inline-block;
    margin-top:8px;
    text-decoration:none;
    color:#9a9a9a;
    font-size:14px;
    transition:.3s;
}

.back:hover{
    color:#ffffff;
}

.footer{
    margin-top:16px;
    font-size:12px;
}

.footer span{
    display:block;
    color:#FFC107;
    font-weight:600;
}

@keyframes breathe{
    0%{ transform:scale(1) rotate(0deg); }
    25%{ transform:scale(1.01) rotate(0.8deg); }
    50%{ transform:scale(1.03) rotate(0deg); }
    75%{ transform:scale(1.01) rotate(-0.8deg); }
    100%{ transform:scale(1) rotate(0deg); }
}

@keyframes fadeUp{
    from{ opacity:0; transform:translateY(30px); }
    to{ opacity:1; transform:translateY(0); }
}

@media(max-width:480px){
    .container{ padding:30px 22px; }
    h1{ font-size:26px; }
    .subtitle{ font-size:14px; }
    .assistant{ width:130px; }
    .btn{ font-size:15px; padding:15px; }
}

@media (max-height:700px){
    .container{ padding:22px 18px; }
    .features{ gap:10px; margin-bottom:20px; }
    .feature{ padding:10px; font-size:14px; }
    .footer{ margin-top:18px; }
}

/* ===========================
   ANIMASI IKON MENU & MINI BANNER
=========================== */
@keyframes robotFloat{
    0%, 100%{ transform:translateY(0); }
    50%{ transform:translateY(-5px); }
}

.menu-grid{
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    gap:15px;
    margin:10px 0 20px;
}

.menu-item{
    width:90px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    transition:.35s;
}

.menu-item img{
    width:85px;
    height:85px;
    object-fit:contain;
    display:block;
    animation:robotFloat 3.5s ease-in-out infinite;
    filter:
        drop-shadow(0 0 10px rgba(255,215,120,.65))
        drop-shadow(0 0 22px rgba(255,193,7,.28));
    transition:.35s;
}

.menu-item:hover img{
    transform:translateY(-6px) scale(1.06);
    filter:
        drop-shadow(0 0 14px rgba(255,215,120,.8))
        drop-shadow(0 0 28px rgba(255,193,7,.45));
}

.menu-item:active img{
    transform:scale(.97);
}

.menu-item span{
    display:none;
}

/* ================= MINI BANNER STYLING ================= */
.mini-slider{
    position:relative;
    z-index:2;
    width:100%;
    height:90px;
    margin:14px auto 6px;
    overflow:hidden;
    border-radius:22px;
    box-shadow:0 4px 10px rgba(0,0,0,.16);
}

.mini-slides{
    display:flex;
    width:300%;
    height:100%;
    transition:transform .95s cubic-bezier(.22,.61,.36,1);
}

.mini-slides img{
    width:33.3333%;
    height:100%;
    flex-shrink:0;
    object-fit:cover;
    object-position:center center;
    display:block;
}

.mini-dots{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:8px;
    margin-bottom:12px;
}

.mini-dots span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#666;
    transition:.3s;
}

.mini-dots span.active{
    background:#FFC107;
}

@media screen and (min-width: 768px) {
    .menu-item img {
        width: 95px;
        height: 95px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="glow"></div>

    <div class="logo">
        <img src="cikurgoicon.png" alt="CIKUR GO Logo">
    </div>

    <h1>CIKUR GO ASSISTANT</h1>

    <p class="subtitle">
        Pendamping profesional untuk berbagai kebutuhan aktivitas Anda dengan mudah, aman, dan nyaman.
    </p>

    <div class="assistant">
        <img src="tombol-assistant.png" alt="CIKUR GO Assistant">
    </div>

    <!-- ===== MINI BANNER ===== -->
    <div class="mini-slider">
        <div class="mini-slides">
            <img src="banner-mini-assistant.png" alt="Mini Assistant">
            <img src="banner-mini-food.png" alt="Mini Food">
            <img src="banner-mini-ride.png" alt="Mini Ride">
        </div>
    </div>

    <div class="mini-dots">
        <span class="active"></span>
        <span></span>
        <span></span>
    </div>

    <!-- ===== MENU GRID (3 LAYANAN UTAMA) ===== -->
    <div class="menu-grid">
        <a href="assistant.html" class="menu-item">
            <img src="tombol-assistant.png" alt="ASSISTANT">
        </a>

        <a href="food.html" class="menu-item">
            <img src="tombol-food.png" alt="FOOD">
        </a>

        <a href="ride.html" class="menu-item">
            <img src="tombol-ride.png" alt="RIDE">
        </a>
    </div>
    
    <div class="features">
        <div class="feature">
            ✅ Profesional & Berpengalaman
        </div>
        <div class="feature">
            ✅ Fleksibel Sesuai Kebutuhan
        </div>
        <div class="feature">
            ✅ Aman, Nyaman & Terpercaya
        </div>
    </div>

    <a href="LINK_FORM_ANDA" target="_blank" class="btn btn-order">
          PESAN SEKARANG
    </a>

    <a href="index.html#chatBtn" class="btn btn-chat">
        💬 Chat dengan CGO
    </a>

    <a href="index.html" class="back">
        ← Kembali ke Beranda
    </a>

    <div class="footer">
        <span>Pasti Mudah, Pasti Nyaman.</span>
        © 2026 CIKUR GO
    </div>

</div>

<script>
/* ===== LOGIKA JAVASCRIPT MINI BANNER ===== */
const miniSlides = document.querySelector(".mini-slides");
const miniDots = document.querySelectorAll(".mini-dots span");
let miniCurrent = 0;
const miniTotal = miniDots.length;

function miniShow(index){
    miniSlides.style.transform = `translateX(-${index * 33.333}%)`;
    miniDots.forEach(dot => dot.classList.remove("active"));
    miniDots[index].classList.add("active");
}

function miniNext(){
    miniCurrent++;
    if(miniCurrent >= miniTotal){
        miniCurrent = 0;
    }
    miniShow(miniCurrent);
}
miniShow(0);
setInterval(miniNext, 7000);
</script>

</body>
</html>
